<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="claude-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E87D5D" />
      <stop offset="100%" stop-color="#D4563B" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#D4563B" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- App Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#claude-orange)" />
  
  <!-- Letter P constructed from geometric shapes -->
  <g fill="#FFFFFF" filter="url(#shadow)">
    <!-- Vertical stem -->
    <rect x="180" y="140" width="44" height="232" rx="12" />
    <!-- Loop -->
    <path d="M 224 140 h 70 c 55 0 96 41 96 96 c 0 55 -41 96 -96 96 h -70 v -44 h 70 c 30 0 52 -22 52 -52 c 0 -30 -22 -52 -52 -52 h -70 v -44 z" />
  </g>

  <!-- Cutout terminal prompt inside the P's loop -->
  <g stroke="url(#claude-orange)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 260 215 l 18 18 l -18 18" />
    <line x1="290" y1="251" x2="315" y2="251" />
  </g>
</svg>